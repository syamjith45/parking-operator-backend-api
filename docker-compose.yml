version: '3.8'

services:
  api:
    build: .
    container_name: parking-operator-api
    ports:
      - "5000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3